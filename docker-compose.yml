version: '3.8'

services:
  # ── PostgreSQL Database ───────────────────────
  db:
    image: postgres:18-alpine
    container_name: prosystem_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGTZ: UTC                 
      TZ: UTC 
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prosystem_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ───────────────────────────
  app:
    build: .
    container_name: prosystem_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - prosystem_network

# ── Volumes ───────────────────────────────────────
volumes:
  postgres_data:

# ── Networks ──────────────────────────────────────
networks:
  prosystem_network:
    driver: bridge